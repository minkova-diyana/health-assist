{% extends 'common/base.html' %}
{% load static %}

{% block header %}
            <h1>News</h1>
{% endblock %}

{% block content %}
    <h3>
        Alwyas be the first to know
    </h3>
    
    <section class="wraper">
        {% for n in news %}
            <div class="news-container">
                <div class="container">
                    <h2>{{ n.title }}</h2>
                    <p>
                        {{ n.summary }}
                        <samp class="hiden-info">{{ n.hidden_info }}</samp>
                        <button class="show-more">Show More</button>
                        <button class="show-less">Show Less</button>
                    </p>
                </div>
            </div>
        {% endfor %}
    </section>
{% endblock %}
